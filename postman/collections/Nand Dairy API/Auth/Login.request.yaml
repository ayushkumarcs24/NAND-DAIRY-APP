$kind: http-request
name: Login
url: "{{base_url}}/api/auth/login"
method: POST
body:
  type: json
  content: |-
    {
      "mobile_number": "9999999999",
      "password": "admin123"
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: |-
      let res = pm.response.json();
      pm.environment.set("token", res.token);
    language: text/javascript
