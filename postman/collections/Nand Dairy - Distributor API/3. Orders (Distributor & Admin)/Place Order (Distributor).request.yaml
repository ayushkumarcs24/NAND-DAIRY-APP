$kind: http-request
url: "{{baseUrl}}/api/orders"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{distToken}}
body:
  type: text
  content: |-
    {
      "items": [
        {
          "product_id": {{productId}},
          "quantity": "50"
        }
      ],
      "notes": "Deliver to shop before 6 AM"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.order && res.order.id) {
          pm.collectionVariables.set("orderId", res.order.id);
      }
    language: text/javascript
order: 1000
