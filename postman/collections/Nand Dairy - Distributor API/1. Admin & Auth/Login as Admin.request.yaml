$kind: http-request
url: "{{baseUrl}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "mobile_number": "9999999999",
      "password": "admin123"
    }
scripts:
  - type: afterResponse
    code: |-
      const response = pm.response.json();
      if (response.token) {
          pm.collectionVariables.set("adminToken", response.token);
      }
    language: text/javascript
order: 1000
