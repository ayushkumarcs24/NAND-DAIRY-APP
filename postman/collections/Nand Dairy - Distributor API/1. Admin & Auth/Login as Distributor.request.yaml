$kind: http-request
url: "{{baseUrl}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "mobile_number": "8888888888",
      "password": "pass123"
    }
scripts:
  - type: afterResponse
    code: |-
      const response = pm.response.json();
      if (response.token) {
          pm.collectionVariables.set("distToken", response.token);
      }
    language: text/javascript
order: 3000
