$kind: http-request
url: "{{baseUrl}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "mobile_number": "8888888888",
      "password": "pass123"
    }
scripts:
  - type: afterResponse
    code: |-
      const r = pm.response.json();
      if (r.token) pm.collectionVariables.set('distToken', r.token);
    language: text/javascript
order: 2000
